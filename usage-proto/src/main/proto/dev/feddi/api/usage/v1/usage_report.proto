syntax = "proto3";

package dev.feddi.api.usage.v1;

import "google/protobuf/timestamp.proto";

option java_multiple_files = true;
option java_outer_classname = "UsageReportProto";
option java_package = "dev.feddi.api.usage.v1";

message UsageReportRequest {
  repeated UsageRecord records = 1;
}

message UsageRecord {
  string operation_name = 1;
  string operation_type = 2;
  string operation_hash = 3;
  string operation_body = 4;
  repeated string field_coordinates = 5;
  repeated string subgraphs_accessed = 6;
  int64 duration_nanos = 7;
  bool http_error = 8;
  bool graphql_error = 9;
  string client_name = 10;
  string client_version = 11;
  google.protobuf.Timestamp timestamp = 12;
  optional int32 multiplier = 13;
}

message UsageReportResponse {
  int32 accepted = 1;
  string error = 2;
}
