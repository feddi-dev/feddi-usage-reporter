name: Publish Tombstone

on:
  workflow_dispatch:
    inputs:
      tombstone_version:
        description: 'CalVer version for the tombstone (e.g. 2026-06-20-1200)'
        required: true
      new_artifact_version:
        description: 'Version of feddi-usage-reporter / feddi-usage-proto to reference as replacement (e.g. 2026-06-20-1718)'
        required: true

jobs:
  publish-tombstone:
    name: Build and publish tombstone to Maven Central
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.7.0
        with:
          distribution: corretto
          java-version: '21'

      - name: Build tombstone central bundle
        working-directory: tombstone
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          ../gradlew centralPortalBundle \
            -PtombstoneVersion=${{ inputs.tombstone_version }} \
            -PnewArtifactVersion=${{ inputs.new_artifact_version }} \
            -PtombstoneRequireSigning=true \
            --no-daemon

      - name: Publish tombstone to Maven Central
        env:
          CENTRAL_BUNDLE_FILE: tombstone/build/central-portal/feddi-api-usage-tombstone-${{ inputs.tombstone_version }}-central-bundle.zip
          CENTRAL_DEPLOYMENT_NAME: feddi-api-usage-tombstone-${{ inputs.tombstone_version }}
          CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
          CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
        run: .github/scripts/publish-maven-central-bundle.sh
